<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রফেশনাল আইডি কার্ড</title>
    <style>
        /* CSS অংশ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .id-card {
            width: 350px;
            height: 500px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            text-align: center;
            position: relative;
            border-top: 10px solid #2c3e50;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px 10px;
        }

        .header h2 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .photo-area {
            margin-top: 25px;
        }

        .photo-area img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #2c3e50;
            object-fit: cover;
        }

        .details {
            padding: 20px;
        }

        .details h3 {
            margin: 10px 0 5px;
            color: #333;
            font-size: 22px;
        }

        .details p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .designation {
            font-weight: bold;
            color: #2c3e50 !important;
            text-transform: uppercase;
            margin-bottom: 15px !important;
        }

        .info-grid {
            text-align: left;
            margin-top: 20px;
            padding: 0 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #2c3e50;
            color: white;
            padding: 10px 0;
            font-size: 12px;
        }

        /* প্রিন্ট করার বোতাম */
        .print-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .print-btn:hover {
            background-color: #219150;
        }

        @media print {
            .print-btn {
                display: none;
            }
            body {
                background-color: white;
            }
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="id-card" id="printableCard">
            <div class="header">
                <h2>তক্ষশীলা রোবটিক্স লিমিটেড</h2>
            </div>

            <div class="photo-area">
                <img src="https://via.placeholder.com/150" alt="Profile Photo" id="profilePic">
            </div>

            <div class="details">
                <h3 id="userName">ইঞ্জিনিয়ার নাম</h3>
                <p class="designation" id="userRole">রোবটিক ইঞ্জিনিয়ার</p>
                
                <div class="info-grid">
                    <div class="info-row">
                        <span class="label">আইডি নং:</span>
                        <span id="userId">TRL-2026-001</span>
                    </div>
                    <div class="info-row">
                        <span class="label">রক্তের গ্রুপ:</span>
                        <span id="userBlood">B+</span>
                    </div>
                    <div class="info-row">
                        <span class="label">ফোন:</span>
                        <span id="userPhone">+৮৮০ ১৭০০-০০০০০০</span>
                    </div>
                </div>
            </div>

            <div class="footer">
                www.yourwebsite.com
            </div>
        </div>

        <button class="print-btn" onclick="printCard()">ডাউনলোড বা প্রিন্ট করুন</button>
    </div>

    <script>
        // জাভাস্ক্রিপ্ট অংশ
        function printCard() {
            window.print();
        }

        // আপনি চাইলে নিচের ফাংশন ব্যবহার করে ডাইনামিকভাবে ডেটা পরিবর্তন করতে পারেন
        function updateCardInfo(name, role, id) {
            document.getElementById('userName').innerText = name;
            document.getElementById('userRole').innerText = role;
            document.getElementById('userId').innerText = id;
        }

        // উদাহরণ: আপডেট করার জন্য কল (প্রয়োজন হলে ব্যবহার করবেন)
        // updateCardInfo("আরিফ আহমেদ", "সিনিয়র রোবটিক্স এক্সপার্ট", "TRL-2026-045");
    </script>

</body>
</html>
